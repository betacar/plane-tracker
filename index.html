<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlaneTracker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9992;</text></svg>">
  </head>
  <body>
    <div id="map" style="width:100vw;height:100vh;position:fixed;top:0;left:0"></div>
    <div id="plane-panel"></div>
    <div id="plane-count">Flights: <span>0</span></div>
    <div id="loading">
      <div class="spinner"></div>
      <div>Fetching flight data...</div>
    </div>
    <div id="fallback-banner" class="hidden">
      Using adsb.fi fallback — airplanes.live unavailable
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
